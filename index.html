<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>blog</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 17px;
      line-height: 1.7;
      color: #1a1a1a;
      background: #fff;
      padding: 60px 24px;
      max-width: 760px;
      margin: 0 auto;
    }

    header {
      margin-bottom: 48px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e5e5e5;
    }

    header h1 {
      font-family: 'Source Sans 3', sans-serif;
      font-size: 28px;
      font-weight: 600;
      color: #1a6ef5;
      letter-spacing: -0.5px;
    }

    .post-list {
      list-style: none;
    }

    .post-list li {
      padding: 24px 0;
      border-bottom: 1px solid #f0f0f0;
    }

    .post-list li:last-child {
      border-bottom: none;
    }

    .post-list a {
      font-family: 'Lora', serif;
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      text-decoration: none;
    }

    .post-list a:hover {
      color: #1a6ef5;
    }

    .post-meta {
      font-size: 14px;
      color: #888;
      margin-top: 6px;
    }

    .post-excerpt {
      margin-top: 8px;
      color: #444;
      font-size: 15.5px;
    }
  </style>
</head>
<body>
  <header>
    <h1>blog</h1>
  </header>

  <ul class="post-list">
    <li>
      <a href="blog/blogpost.html">No thanks</a>
      <p class="post-meta">April 17, 2026</p>
      <p class="post-excerpt">My First online blog post, the kind of shit i have done, you don't want you to know, so i'll fixate on code here. </p>
    </li>
    <!-- Add more posts here by copying the <li> block above -->
  </ul>
</body>
</html>
